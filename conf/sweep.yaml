defaults:
  - config
  - optuna: sanitysweep
  - _self_

# plot_mode: scalar or list. Allowed: per_parameter, all_together, heatmap.
# When given a list, plots for each mode are written to a separate directory.
plot_mode:
  - per_parameter
  - all_together
  - heatmap

# direction: scalar or list controlling the metric reduction over timesteps
# and nodes. avg = mean over timesteps and nodes. worse = max for metrics
# where higher is worse (regret, distance, losses) and min otherwise.
# When given a list (e.g. ["avg", "worse"]) both reductions are plotted in
# separate directories.
direction:
  - avg
  - worse

plot_metrics:
  - validation_accuracies
  - validation_losses
  - train_losses
  - reward_algorithm
  - reward_oracle
  - regret
  - normalized_regret
  - neighbor_disagreement
  - consensus_drift
