optuna:
  n_trials: 20
  direction: maximize
  output_dir: .optuna_runs
  search_space:
    heterogeneity.alpha:
      type: categorical
      choices: [0.01, 1.0, 10.0, 100.0]
    topology.neighbor_sampler:
      type: categorical
      choices: [cs+, uniform, bandit]
    topology.sampling:
      type: categorical
      choices: [0.01, 0.1, 0.5, 0.9]
      when:
        topology.neighbor_sampler: [uniform, bandit]
    topology.bandit_epsilon: 
      type: categorical
      choices: [0.01, 0.1, 0.5, 0.9]
      when:
        topology.neighbor_sampler: bandit

