optuna:
  n_trials: 20
  direction: maximize
  output_dir: .optuna_runs
  search_space:
    local.alpha:
      type: float
      low: 0.1
      high: 10.0
      log: true
    local.nb_local_steps:
      type: int
      low: 1
      high: 5
    local.params_common.learning-rate:
      type: float
      low: 0.01
      high: 1.0
      log: true
    topology.sampling:
      type: float
      low: 0.05
      high: 0.5
    topology.neighbor_sampler:
      type: categorical
      choices: [uniform, bandit]
