# Optuna study direction for the scalar objective returned by the sweep (validation accuracy).
direction: maximize

search_space:
  heterogeneity.alpha:
    name: alpha
    type: categorical
    choices: [0.1, 0.5, 1.0, 5.0, 10.0, 50.0, 100.0]
  topology.neighbor_sampler:
    name: sampler
    type: categorical
    choices: [uniform, bandit]
  topology.sampling:
    type: categorical
    choices: [0.01, 0.05, 0.1, 0.5, 0.9]
    when:
      topology.neighbor_sampler: [uniform, bandit]
