mode: dynamic
dataset: mnist
model: cnn_mnist
nodes: 100
sampling: 0.03
alpha: 1
result_directory: results_mnist/results-data-mnist-iclr
plot_directory: results_mnist/results-plot-mnist-iclr
byzcount: 0
byzantine_budget: 0
nb_local_steps: 1
attack: null
method: null
params_common:
  batch-size: 25
  loss: NLLLoss
  weight-decay: 1e-4
  nb-steps: 200
  momentum-worker: 0.9
  numb-labels: 10
  pre-aggregator: nnm
  aggregator: trmean
  evaluation-delta: 20
  rag: true

hydra:
  sweeper:
    params:
      seed: 0,1
      profile.nodes: 50,100
      profile.sampling: 0.03,0.05
      profile.nb_local_steps: 1,3
