mode: dynamic
dataset: mnist
model: cnn_mnist
nb_workers: 100
alpha: 1
result_directory: results_mnist/results-data-mnist-iclr
plot_directory: results_mnist/results-plot-mnist-iclr
byzcount: 1
b_hat: 1
nb_neighbors: 3
nb_local_steps: 1
attack: ALIE
method: null
params_common:
  batch-size: 25
  loss: NLLLoss
  weight-decay: 1e-4
  nb-steps: 200
  momentum-worker: 0.9
  numb-labels: 10
  pre-aggregator: nnm
  aggregator: trmean
  evaluation-delta: 20
  rag: true

hydra:
  sweeper:
    params:
      seed: 0,1
      profile.byzcount: 1,0
      profile.b_hat: 1,0
      profile.nb_neighbors: 3,4,5
      profile.attack: ALIE
      profile.nb_local_steps: 1,3
