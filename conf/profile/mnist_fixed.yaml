mode: fixed
dataset: mnist
model: cnn_mnist
nb_workers: 30
alpha: 1
result_directory: results_mnist/results-data-mnist-fx
plot_directory: results_mnist/results-plot-mnist-fx
byzcount: 6
b_hat: 6
nb_neighbors: 15
nb_local_steps: 1
attack: dissensus
method: cs+
params_common:
  batch-size: 25
  loss: NLLLoss
  weight-decay: 1e-4
  nb-steps: 200
  momentum-worker: 0.9
  numb-labels: 10
  pre-aggregator: nnm
  aggregator: trmean
  evaluation-delta: 20
