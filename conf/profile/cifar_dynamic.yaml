mode: dynamic
dataset: cifar10
model: cnn_cifar_old
nb_workers: 20
alpha: 1
result_directory: results_cifar10/results-data-cifar10-final
plot_directory: results_cifar10/results-plot-cifar10-final
byzcounts: [3, 0]
b_hat_list: []
nb_neighbors_list: [6]
nb_local_steps: [1, 3]
attacks: [ALIE, FOE, SF]
method_values: [null]
params_common:
  batch-size: 50
  loss: NLLLoss
  learning-rate: 0.5
  learning-rate-decay: 100
  learning-rate-decay-delta: 500
  weight-decay: 1e-2
  evaluation-delta: 20
  nb-steps: 2000
  momentum-worker: 0.99
  numb-labels: 10
  mimic-learning-phase: 400
  pre-aggregator: nnm
  aggregator: trmean
  rag: true
