# @package _global_
local:
  dataset: cifar10
  model: cnn_cifar_old
  alpha: 1
  nb_local_steps: 1
  params_common:
    batch-size: 50
    loss: NLLLoss
    learning-rate: 0.5
    learning-rate-decay: 100
    learning-rate-decay-delta: 500
    weight-decay: 1e-2
    evaluation-delta: 20
    nb-steps: 2000
    momentum-worker: 0.99
    numb-labels: 10
    mimic-learning-phase: 400
    pre-aggregator: nnm
    aggregator: trmean
    rag: true
topology:
  mode: dynamic
  nodes: 20
  sampling: 0.32
  neighbor_sampler: uniform
adversary:
  byzcount: 0
  byzantine_budget: 0
  attack: null

hydra:
  sweeper:
    params:
      seed: 0,1
      topology.nodes: 20
      topology.sampling: 0.32
      local.nb_local_steps: 1,3
