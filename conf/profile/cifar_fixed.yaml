mode: fixed
dataset: cifar10
model: cnn_cifar_old
nodes: 20
sampling: 0.32
alpha: 1
result_directory: results_cifar10/results-data-cifar10-fx-dissensus
plot_directory: results_cifar10/results-plot-cifar10-fx-dissensus
byzcount: 0
b_hat: 0
nb_local_steps: 3
attack: null
method: cs+
params_common:
  batch-size: 50
  loss: NLLLoss
  learning-rate: 0.5
  learning-rate-decay: 100
  learning-rate-decay-delta: 500
  weight-decay: 1e-2
  evaluation-delta: 20
  nb-steps: 2000
  momentum-worker: 0.99
  numb-labels: 10
  mimic-learning-phase: 400
  pre-aggregator: nnm
  aggregator: trmean

hydra:
  sweeper:
    params:
      train: fixed
      seed: 0,1
      profile.nodes: 20
      profile.sampling: 0.32
      profile.nb_local_steps: 3,1
      profile.method: cs+,gts,cs_he
