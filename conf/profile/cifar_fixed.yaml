mode: fixed
dataset: cifar10
model: cnn_cifar_old
nb_workers: 20
alpha: 1
result_directory: results_cifar10/results-data-cifar10-fx-dissensus
plot_directory: results_cifar10/results-plot-cifar10-fx-dissensus
byzcount: 3
b_hat: null
nb_neighbors: 6
nb_local_steps: 3
attack: dissensus
method: cs+
params_common:
  batch-size: 50
  loss: NLLLoss
  learning-rate: 0.5
  learning-rate-decay: 100
  learning-rate-decay-delta: 500
  weight-decay: 1e-2
  evaluation-delta: 20
  nb-steps: 2000
  momentum-worker: 0.99
  numb-labels: 10
  mimic-learning-phase: 400
  pre-aggregator: nnm
  aggregator: trmean

hydra:
  sweeper:
    params:
      train: fixed
      seed: 0,1
      profile.byzcount: 3,0
      profile.nb_neighbors: 6
      profile.attack: dissensus,ALIE,SF,FOE
      profile.nb_local_steps: 3,1
      profile.method: cs+,gts,cs_he
